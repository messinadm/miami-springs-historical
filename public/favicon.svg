<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Filled triangle, outside transparent -->
  <polygon
    points="16,16 112,112 16,112"
    fill="#8b4513"
    stroke="#8b4513"
    stroke-width="2"
    stroke-linejoin="round"
  />

  <!-- Triangle border -->
  <polygon
    points="16,16 112,112 16,112"
    fill="none"
    stroke="#d2b48c"
    stroke-width="5"
    stroke-linejoin="round"
  />

  <!-- Circle Park touching the hypotenuse -->
  <circle cx="62" cy="85" r="16" fill="none" stroke="#d2b48c" stroke-width="5"/>
  <circle cx="62" cy="85" r="6" fill="#2c5f2d"/>
</svg>
