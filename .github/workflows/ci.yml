name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Astro type check
        run: npx astro check

      - name: Build
        run: npm run build
